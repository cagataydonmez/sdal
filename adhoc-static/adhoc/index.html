<!DOCTYPE html><html lang="tr"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ad Hoc Uygulamalar</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;padding:48px 20px}
h1{text-align:center;font-size:26px;font-weight:700;margin-bottom:8px}
.sub{text-align:center;color:#64748b;font-size:14px;margin-bottom:48px}
.grid{display:flex;flex-direction:column;gap:16px;max-width:480px;margin:0 auto}
.card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:24px;display:flex;align-items:center;gap:20px;text-decoration:none;color:inherit;transition:border-color 0.2s,background 0.2s}
.card:hover{border-color:#475569;background:#263349}
.icon{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.icon-tv{background:#1d3a6e}
.icon-clean{background:#064e3b}
.info{flex:1}
.name{font-size:18px;font-weight:600;margin-bottom:4px}
.ver{font-size:13px;color:#94a3b8;margin-bottom:6px}
.desc{font-size:13px;color:#64748b;line-height:1.4}
.arrow{color:#475569;font-size:20px;flex-shrink:0}
</style></head>
<body>
<h1>Ad Hoc Uygulamalar</h1>
<p class="sub">Safari ile aç · Yükleme için geliştiriciye güven ver</p>
<div class="grid">
  <a class="card" href="/cdiptv/">
    <div class="icon icon-tv">📺</div>
    <div class="info">
      <div class="name">CDIPTv</div>
      <div class="ver">Sürüm 1.3.2 · iOS</div>
      <div class="desc">IPTV oynatıcı ve torrent destekli medya merkezi</div>
    </div>
    <div class="arrow">›</div>
  </a>
  <a class="card" href="/cdcleaner/">
    <div class="icon icon-clean">🧹</div>
    <div class="info">
      <div class="name">CDCleaner iOS</div>
      <div class="ver">Sürüm 0.2.0 · iOS</div>
      <div class="desc">Depolama analiz ve temizleme asistanı</div>
    </div>
    <div class="arrow">›</div>
  </a>
</div>
</body></html>
