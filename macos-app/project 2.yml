name: SDALMac
options:
  bundleIdPrefix: org.sdal
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  SDALMac:
    type: application
    platform: macOS
    sources:
      - SDALMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.sdal.mac
        INFOPLIST_FILE: SDALMac/Info.plist
        PRODUCT_NAME: SDAL
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        ENABLE_HARDENED_RUNTIME: true
