			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "# Inject loose icon PNGs (required by altool 90394/90741)\nSRC=\"${SRCROOT}/Runner/Assets.xcassets/AppIcon.appiconset/Icon-App-1024x1024@1x.png\"\nDEST=\"${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app\"\nif [ ! -f \"$SRC\" ]; then\n  echo \"warning: [SdalWatch] Source icon not found at $SRC\"\n  exit 0\nfi\nci() { /usr/bin/sips -z \"$2\" \"$2\" \"$SRC\" --out \"${DEST}/$1\" > /dev/null 2>&1; }\nci AppIcon24x24@2x.png       48\nci AppIcon27.5x27.5@2x.png   55\nci AppIcon40x40@2x.png       80\nci AppIcon44x44@2x.png       88\nci AppIcon50x50@2x.png      100\nci AppIcon86x86@2x.png      172\nci AppIcon98x98@2x.png      196\nci AppIcon108x108@2x.png    216\nci AppIcon117x117@2x.png    234\nci AppIcon129x129@2x.png    258\nci AppIcon1024x1024@1x.png 1024\n\n# Add CFBundleIconFiles to Info.plist (required by altool 90391)\n# GENERATE_INFOPLIST_FILE never emits this key; altool rejects watch apps without it\n# even when the PNGs are present in the bundle.\nPLIST=\"${DEST}/Info.plist\"\nPB=/usr/libexec/PlistBuddy\n\n$PB -c \"Add :CFBundleIcons dict\"                       \"$PLIST\" 2>/dev/null || true\n$PB -c \"Add :CFBundleIcons:CFBundlePrimaryIcon dict\"   \"$PLIST\" 2>/dev/null || true\n$PB -c \"Delete :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles\" \"$PLIST\" 2>/dev/null || true\n$PB -c \"Add    :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles array\" \"$PLIST\"\n\ni=0\nfor NAME in AppIcon24x24@2x AppIcon27.5x27.5@2x AppIcon40x40@2x AppIcon44x44@2x \\\n            AppIcon50x50@2x AppIcon86x86@2x AppIcon98x98@2x AppIcon108x108@2x \\\n            AppIcon117x117@2x AppIcon129x129@2x AppIcon1024x1024@1x; do\n  $PB -c \"Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles:$i string $NAME\" \"$PLIST\"\n  i=$((i+1))\ndone\n";
		};
