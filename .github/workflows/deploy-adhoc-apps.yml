with open('/tmp/adhoc_index.html', 'w') as f:
    f.write(html)
print('adhoc index.html written')
"
            $SCP /tmp/adhoc_index.html "${DO_USER}@${DO_HOST}:/var/www/html/adhoc/index.html"
            echo "/adhoc/ index deployed"
          fi

          echo "All done"
