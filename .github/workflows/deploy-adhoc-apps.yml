  <a class=\"card\" href=\"/cdiptv/\">
    <div class=\"icon icon-tv\">&#x1F4FA;</div>
    <div class=\"info\">
      <div class=\"name\">CDIPTv</div>
      <div class=\"ver\">Surum 1.3.2 - iOS</div>
      <div class=\"desc\">IPTV oynatici ve torrent destekli medya merkezi</div>
