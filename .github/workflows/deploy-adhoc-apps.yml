name: Deploy Ad Hoc Static Files

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'Which app to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - cdcleaner
          - adhoc-index

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deploy static files over SSH
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
          DO_SSH_KEY: ${{ secrets.DO_SSH_KEY }}
          DO_PORT: ${{ secrets.DO_PORT }}
          APP: ${{ github.event.inputs.app }}
        run: |
          set -euo pipefail

          KEY_FILE="$(mktemp)"
          trap 'rm -f "$KEY_FILE"' EXIT
          printf '%s\n' "$DO_SSH_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"

          SSH="ssh -i $KEY_FILE -p $DO_PORT -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15"
          SCP="scp -i $KEY_FILE -P $DO_PORT -o BatchMode=yes -o StrictHostKeyChecking=accept-new"

          $SSH "${DO_USER}@${DO_HOST}" "mkdir -p /var/www/html/cdcleaner /var/www/html/adhoc && echo 'Directories ready'"

          if [[ "$APP" == "all" || "$APP" == "cdcleaner" ]]; then
            python3 -c "
import base64, sys
manifest = '''<?xml version=\"1.0\" encoding=\"UTF-8\"?>
<!DOCTYPE plist PUBLIC \"-//Apple//DTD PLIST 1.0//EN\" \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\">
<plist version=\"1.0\">
<dict>
  <key>items</key>
  <array>
    <dict>
      <key>assets</key>
      <array>
        <dict>
          <key>kind</key><string>software-package</string>
          <key>url</key><string>https://sdalsosyal.mywire.org/cdcleaner/CDCleanerIOS.ipa</string>
        </dict>
      </array>
      <key>metadata</key>
      <dict>
        <key>bundle-identifier</key><string>com.dkneural.cdcleaner.ios</string>
        <key>bundle-version</key><string>0.2.0</string>
        <key>kind</key><string>software</string>
        <key>title</key><string>CDCleaner iOS</string>
      </dict>
    </dict>
  </array>
</dict>
</plist>
'''
with open('/tmp/cdcleaner_manifest.plist', 'w') as f:
    f.write(manifest)
print('manifest.plist written')
"
            python3 -c "
html = '''<!DOCTYPE html><html lang=\"tr\"><head><meta charset=\"utf-8\">
<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">
<title>CDCleaner iOS Kurulum</title>
<style>
body{font-family:-apple-system,sans-serif;background:#0f172a;color:#e2e8f0;text-align:center;padding:48px 20px}
a.btn{display:inline-block;margin-top:24px;padding:16px 32px;background:#10b981;color:#fff;text-decoration:none;border-radius:12px;font-size:18px;font-weight:600}
.v{color:#94a3b8;font-size:14px;margin-top:8px}
.n{color:#64748b;font-size:13px;margin-top:32px;line-height:1.6}
.desc{color:#94a3b8;font-size:15px;margin-top:16px;max-width:400px;margin-left:auto;margin-right:auto}
</style></head>
<body>
<h1>CDCleaner iOS</h1>
<div class=\"v\">Surum 0.2.0 - iOS</div>
<div class=\"desc\">Depolama analiz ve temizleme asistani</div>
<a class=\"btn\" href=\"itms-services://?action=download-manifest&url=https://sdalsosyal.mywire.org/cdcleaner/manifest.plist\">Uygulamayi Yukle</a>
<p class=\"n\">Safari ile ac. Yukle ye dokun - Yukle onayi.<br>
Ardindan Ayarlar - Genel - VPN ve Cihaz Yonetimi nden<br>gelistiriciye guven ver.</p>
</body></html>'''
with open('/tmp/cdcleaner_index.html', 'w') as f:
    f.write(html)
print('index.html written')
"
            $SCP /tmp/cdcleaner_manifest.plist "${DO_USER}@${DO_HOST}:/var/www/html/cdcleaner/manifest.plist"
            $SCP /tmp/cdcleaner_index.html "${DO_USER}@${DO_HOST}:/var/www/html/cdcleaner/index.html"
            echo "CDCleaner pages deployed"

            echo "Downloading CDCleanerIOS.ipa from GitHub Release..."
            curl -L -o /tmp/CDCleanerIOS.ipa \
              "https://github.com/DKNeural/CDCleaner/releases/download/v0.2.0/CDCleanerIOS.ipa" && \
            $SCP /tmp/CDCleanerIOS.ipa "${DO_USER}@${DO_HOST}:/var/www/html/cdcleaner/CDCleanerIOS.ipa" && \
            echo "IPA uploaded" || echo "Warning: IPA upload failed"
          fi

          if [[ "$APP" == "all" || "$APP" == "adhoc-index" ]]; then
            python3 -c "
html = '''<!DOCTYPE html><html lang=\"tr\"><head><meta charset=\"utf-8\">
<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">
<title>Ad Hoc Uygulamalar</title>
