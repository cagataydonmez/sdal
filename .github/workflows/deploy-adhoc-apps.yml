    <div class=\"arrow\">&#x203A;</div>
  </a>
  <a class=\"card\" href=\"/cdcleaner/\">
    <div class=\"icon icon-clean\">&#x1F9F9;</div>
    <div class=\"info\">
      <div class=\"name\">CDCleaner iOS</div>
      <div class=\"ver\">Surum 0.2.0 - iOS</div>
      <div class=\"desc\">Depolama analiz ve temizleme asistani</div>
