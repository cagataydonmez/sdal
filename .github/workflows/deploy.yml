name: Deploy To DigitalOcean

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install Server Dependencies
        run: npm --prefix server ci --omit=dev

      - name: Contract Smoke (Phase 2 Health)
        run: npm --prefix server run test:phase2-health

      - name: Migration Artifacts Sanity
        run: npm --prefix server run migrate:verify

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Preflight Secrets Check
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
          DO_SSH_KEY: ${{ secrets.DO_SSH_KEY }}
          DO_SSH_PASSPHRASE: ${{ secrets.DO_SSH_PASSPHRASE }}
          DO_PORT: ${{ secrets.DO_PORT }}
          DO_APP_DIR: ${{ secrets.DO_APP_DIR }}
          DO_ENV_FILE: ${{ secrets.DO_ENV_FILE }}
        run: |
          set -euo pipefail
          missing=()

          [[ -n "${DO_HOST:-}" ]] || missing+=("DO_HOST")
          [[ -n "${DO_USER:-}" ]] || missing+=("DO_USER")
          [[ -n "${DO_SSH_KEY:-}" ]] || missing+=("DO_SSH_KEY")
          [[ -n "${DO_PORT:-}" ]] || missing+=("DO_PORT")
          [[ -n "${DO_APP_DIR:-}" ]] || missing+=("DO_APP_DIR")

          if (( ${#missing[@]} > 0 )); then
            echo "::error title=Missing required GitHub secrets::Set these secrets: ${missing[*]}"
            exit 1
          fi

          if ! [[ "${DO_PORT}" =~ ^[0-9]+$ ]]; then
            echo "::error title=Invalid DO_PORT::DO_PORT must be numeric, got '${DO_PORT}'."
            exit 1
          fi

          if ! [[ "${DO_APP_DIR}" == /* ]]; then
            echo "::error title=Invalid DO_APP_DIR::DO_APP_DIR must be an absolute path, got '${DO_APP_DIR}'."
            exit 1
          fi

          if [[ "${DO_HOST}" == http://* || "${DO_HOST}" == https://* ]]; then
            echo "::error title=Invalid DO_HOST::DO_HOST must be only hostname or IP, without protocol."
            exit 1
          fi

          if [[ "${DO_SSH_KEY}" == ssh-* ]]; then
            echo "::error title=Invalid DO_SSH_KEY::DO_SSH_KEY looks like a public key. Paste the private key content."
            exit 1
          fi

          if ! printf '%s\n' "${DO_SSH_KEY}" | grep -Eq '-----BEGIN (OPENSSH|RSA|EC|DSA) PRIVATE KEY-----'; then
            echo "::warning title=DO_SSH_KEY format check::Key header not recognized. Ensure full private key is pasted."
          fi

          if [[ -n "${DO_SSH_PASSPHRASE:-}" ]]; then
            echo "::notice title=SSH passphrase configured::DO_SSH_PASSPHRASE will be used."
          fi

          if [[ -z "${DO_ENV_FILE:-}" ]]; then
            echo "::warning title=DO_ENV_FILE not set::Falling back to /etc/sdal/sdal.env on the server."
          fi

      - name: SSH Auth Probe
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
          DO_SSH_KEY: ${{ secrets.DO_SSH_KEY }}
          DO_SSH_PASSPHRASE: ${{ secrets.DO_SSH_PASSPHRASE }}
          DO_PORT: ${{ secrets.DO_PORT }}
        run: |
          set -euo pipefail

          KEY_FILE="$(mktemp)"
          trap 'rm -f "$KEY_FILE"' EXIT
          printf '%s\n' "$DO_SSH_KEY" >"$KEY_FILE"
          chmod 600 "$KEY_FILE"

          PASSPHRASE_VALUE="${DO_SSH_PASSPHRASE:-}"
          if ! ssh-keygen -y -P "$PASSPHRASE_VALUE" -f "$KEY_FILE" >/dev/null 2>&1; then
            echo "::error title=DO_SSH_KEY parse failed::Private key is invalid or passphrase is wrong."
            exit 1
          fi

          if ! timeout 10 bash -c "cat < /dev/null > /dev/tcp/${DO_HOST}/${DO_PORT}"; then
            echo "::error title=TCP connectivity failed::GitHub runner cannot reach ${DO_HOST}:${DO_PORT}."
            exit 1
          fi

          SSH_CMD=(ssh -i "$KEY_FILE" -p "$DO_PORT" -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10 -v)
          if ! "${SSH_CMD[@]}" "${DO_USER}@${DO_HOST}" "echo SSH_AUTH_OK && whoami"; then
            echo "::error title=SSH auth failed::Check DO_USER, DO_SSH_KEY, DO_SSH_PASSPHRASE and authorized_keys."
            exit 1
          fi

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          passphrase: ${{ secrets.DO_SSH_PASSPHRASE }}
          port: ${{ secrets.DO_PORT }}
          timeout: 40s
          command_timeout: 20m
          debug: true
          script_stop: true
          script: |
            set -euo pipefail
            export APP_DIR="${{ secrets.DO_APP_DIR }}"
            export BRANCH="main"
            export ENV_FILE="${{ secrets.DO_ENV_FILE }}"
            if [[ -z "${ENV_FILE:-}" ]]; then
              export ENV_FILE="/etc/sdal/sdal.env"
            fi
            if command -v sudo >/dev/null 2>&1; then
              if sudo -n true >/dev/null 2>&1; then
                sudo -n bash "$APP_DIR/ops/deploy-systemd.sh"
              else
                bash "$APP_DIR/ops/deploy-systemd.sh"
              fi
            else
              bash "$APP_DIR/ops/deploy-systemd.sh"
            fi

      - name: Deploy Failure Diagnostics
        if: failure()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          passphrase: ${{ secrets.DO_SSH_PASSPHRASE }}
          port: ${{ secrets.DO_PORT }}
          timeout: 40s
          command_timeout: 10m
          debug: true
          script_stop: false
          script: |
            set -euo pipefail
            echo "[diag] date=$(date -Iseconds)"
            echo "[diag] whoami=$(whoami)"
            echo "[diag] uname=$(uname -a)"
            echo "[diag] systemctl status sdal-api.service"
            if command -v sudo >/dev/null 2>&1 && sudo -n true >/dev/null 2>&1; then
              sudo -n systemctl status sdal-api.service --no-pager -l || true
              echo "[diag] systemctl status sdal-worker.service"
              sudo -n systemctl status sdal-worker.service --no-pager -l || true
              echo "[diag] systemctl show sdal-api.service (state/env)"
              sudo -n systemctl show sdal-api.service --property=ActiveState --property=SubState --property=MainPID --property=Environment --property=EnvironmentFiles || true
              echo "[diag] journalctl -u sdal-api.service -n 200"
              sudo -n journalctl -u sdal-api.service -n 200 --no-pager || true
            else
              systemctl status sdal-api.service --no-pager -l || true
              echo "[diag] systemctl status sdal-worker.service"
              systemctl status sdal-worker.service --no-pager -l || true
              echo "[diag] systemctl show sdal-api.service (state/env)"
              systemctl show sdal-api.service --property=ActiveState --property=SubState --property=MainPID --property=Environment --property=EnvironmentFiles || true
              echo "[diag] journalctl -u sdal-api.service -n 200"
              journalctl -u sdal-api.service -n 200 --no-pager || true
            fi
            echo "[diag] listening ports"
            ss -ltnp || true

      - name: Post-Deploy Health Verification
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          passphrase: ${{ secrets.DO_SSH_PASSPHRASE }}
          port: ${{ secrets.DO_PORT }}
          timeout: 40s
          command_timeout: 10m
          debug: true
          script_stop: true
          script: |
            set -euo pipefail
            ENV_FILE="${{ secrets.DO_ENV_FILE }}"
            if [[ -z "${ENV_FILE:-}" ]]; then
              ENV_FILE="/etc/sdal/sdal.env"
            fi
            EXPECTED_DB_DRIVER="${{ vars.EXPECTED_DB_DRIVER }}"

            if [[ -f "$ENV_FILE" ]]; then
              set -a
              # shellcheck disable=SC1090
              source "$ENV_FILE"
              set +a
            fi

            PORT_TO_USE="${PORT:-8787}"
            HEALTH_BODY=""
            for attempt in $(seq 1 20); do
              if HEALTH_BODY="$(curl -fsS --max-time 4 "http://127.0.0.1:${PORT_TO_USE}/api/health" 2>/dev/null)"; then
                break
              fi
              if HEALTH_BODY="$(curl -fsS --max-time 4 "http://localhost:${PORT_TO_USE}/api/health" 2>/dev/null)"; then
                break
              fi
              sleep 2
            done

            if [[ -z "${HEALTH_BODY:-}" ]]; then
              echo "Could not fetch /api/health on port ${PORT_TO_USE}"
              if command -v sudo >/dev/null 2>&1 && sudo -n true >/dev/null 2>&1; then
                sudo -n systemctl status sdal-api.service --no-pager -l || true
                sudo -n journalctl -u sdal-api.service -n 120 --no-pager || true
              else
                systemctl status sdal-api.service --no-pager -l || true
                journalctl -u sdal-api.service -n 120 --no-pager || true
              fi
              exit 1
            fi

            echo "$HEALTH_BODY"

            node -e '
              const body = JSON.parse(process.argv[1]);
              const expectedDriver = String(process.argv[2] || "").trim();
              if (!body.ok) {
                console.error("health.ok is false");
                process.exit(1);
              }
              if (!body.dbReady) {
                console.error("health.dbReady is false");
                process.exit(1);
              }
              if (expectedDriver && String(body.dbDriver || "") !== expectedDriver) {
                console.error(`health.dbDriver expected ${expectedDriver} but got ${body.dbDriver}`);
                process.exit(1);
              }
            ' "$HEALTH_BODY" "$EXPECTED_DB_DRIVER"

      - name: Post-Deploy Failure Diagnostics
        if: failure()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          passphrase: ${{ secrets.DO_SSH_PASSPHRASE }}
          port: ${{ secrets.DO_PORT }}
          timeout: 40s
          command_timeout: 10m
          debug: true
          script_stop: false
          script: |
            set -euo pipefail
            echo "[diag-post] date=$(date -Iseconds)"
            if command -v sudo >/dev/null 2>&1 && sudo -n true >/dev/null 2>&1; then
              sudo -n systemctl status sdal-api.service --no-pager -l || true
              sudo -n systemctl show sdal-api.service --property=ActiveState --property=SubState --property=MainPID --property=Environment --property=EnvironmentFiles || true
              sudo -n journalctl -u sdal-api.service -n 200 --no-pager || true
            else
              systemctl status sdal-api.service --no-pager -l || true
              systemctl show sdal-api.service --property=ActiveState --property=SubState --property=MainPID --property=Environment --property=EnvironmentFiles || true
              journalctl -u sdal-api.service -n 200 --no-pager || true
            fi
            ss -ltnp || true
