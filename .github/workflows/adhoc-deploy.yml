name: Deploy Ad Hoc Static Files

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'Which app to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - cdcleaner
          - adhoc-index

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy over SSH
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
          DO_SSH_KEY: ${{ secrets.DO_SSH_KEY }}
          DO_PORT: ${{ secrets.DO_PORT }}
          APP: ${{ github.event.inputs.app }}
        run: |
          set -euo pipefail

          KEY_FILE="$(mktemp)"
          trap 'rm -f "$KEY_FILE"' EXIT
          printf '%s\n' "$DO_SSH_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"

          SSH="ssh -i $KEY_FILE -p $DO_PORT -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15"
          SCP="scp -i $KEY_FILE -P $DO_PORT -o BatchMode=yes -o StrictHostKeyChecking=accept-new"

          $SSH "${DO_USER}@${DO_HOST}" "mkdir -p /var/www/html/cdcleaner /var/www/html/adhoc && echo 'Directories ready'"

          if [[ "$APP" == "all" || "$APP" == "cdcleaner" ]]; then
            $SCP adhoc-static/cdcleaner/manifest.plist "${DO_USER}@${DO_HOST}:/var/www/html/cdcleaner/manifest.plist"
            $SCP adhoc-static/cdcleaner/index.html "${DO_USER}@${DO_HOST}:/var/www/html/cdcleaner/index.html"
            echo "CDCleaner pages deployed"

            echo "Downloading CDCleanerIOS.ipa from GitHub Release..."
            curl -L -o /tmp/CDCleanerIOS.ipa \
              "https://github.com/DKNeural/CDCleaner/releases/download/v0.2.0/CDCleanerIOS.ipa"
            $SCP /tmp/CDCleanerIOS.ipa "${DO_USER}@${DO_HOST}:/var/www/html/cdcleaner/CDCleanerIOS.ipa"
            echo "IPA uploaded ($(du -sh /tmp/CDCleanerIOS.ipa | cut -f1))"
          fi

          if [[ "$APP" == "all" || "$APP" == "adhoc-index" ]]; then
            $SCP adhoc-static/adhoc/index.html "${DO_USER}@${DO_HOST}:/var/www/html/adhoc/index.html"
            echo "/adhoc/ index deployed"
          fi

          echo "All done"
